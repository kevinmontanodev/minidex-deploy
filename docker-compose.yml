services:
  api:
    build: ./api
    expose:
      - "8080"
    env_file:
      - .env

  frontend:
    build: ./frontend
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    expose:
      - "4321"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:r
    depends_on:
      - api
      - frontend