upstream frontend_server {
    server frontend:4321;
}

upstream api_server {
    server api:8080;
}

server {
    listen 80;

    # 1. Backend Spring Boot (Más específico primero)
    # Importante: El trailing slash '/' al final de proxy_pass influye
    location /api/v1/ {
        proxy_pass http://api_server/api/v1/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Astro API (BFF interno)
    # Captura /api/... pero NO /api/v1/ gracias al orden o especificidad
    location /api/ {
        proxy_pass http://frontend_server/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Astro SSR (Frontend y páginas)
    location / {
        proxy_pass http://frontend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
