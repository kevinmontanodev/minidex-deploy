upstream frontend_server {
    server frontend:4321;
}

upstream api_server {
    server api:8080;
}

server {
    listen 80;

    # 1. Spring Boot Backend (More specific first)
    # Important: The trailing slash '/' at the end of proxy_pass matters
    location /api/v1/ {
        proxy_pass http://api_server/api/v1/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Astro API (Internal BFF)
    # Captures /api/... but NOT /api/v1/ due to ordering or specificity
    location /api/ {
        proxy_pass http://frontend_server/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Astro SSR (Frontend and pages)
    location / {
        proxy_pass http://frontend_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
